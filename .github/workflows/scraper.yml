name: Run Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          JOBSCRAPER_SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          JOBSCRAPER_SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          JOBSCRAPER_SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          JOBSCRAPER_SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          JOBSCRAPER_SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          JOBSCRAPER_USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          JOBSCRAPER_USAJOBS_USER_AGENT: ${{ secrets.USAJOBS_USER_AGENT }}
        run: python -m app.orchestrator
