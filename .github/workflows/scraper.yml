name: Run Scraper
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          echo "Waking up Render..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
                     https://job-scraper-dc89.onrender.com/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Render is awake!"
              sleep 5
              break
            fi
            sleep 30
          done

      - name: Trigger Scraper
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                   --max-time 15 \
                   -X POST \
                   https://job-scraper-dc89.onrender.com/scrape)
          echo "Response: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Failed to trigger"
            exit 1
          fi
          echo "✅ Scraper triggered in background!"
