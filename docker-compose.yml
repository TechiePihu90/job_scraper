version: "3.9"

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - JOBSCRAPER_LOG_LEVEL=INFO
      - JOBSCRAPER_SCRAPE_INTERVAL_HOURS=6
      - JOBSCRAPER_MAX_CONCURRENT_SCRAPERS=50
      - JOBSCRAPER_JOB_TTL_SECONDS=86400
      - PGSSLMODE=require
    volumes:
      - ./companies.json:/app/companies.json:ro
    restart: unless-stopped
